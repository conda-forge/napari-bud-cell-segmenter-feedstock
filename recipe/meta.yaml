{% set name = "napari-bud-cell-segmenter" %}
{% set version = "0.1.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari-bud-cell-segmenter-{{ version }}.tar.gz
  sha256: 680c97f7aaa664c623e7e76bb4834797ea404c4952404643f8edd2bb7b15c9e9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools >=42.0.0
    - wheel
  run:
    - magicgui
    - matplotlib-base
    - napari
    - numpy
    - pandas
    - python >={{ python_min }}
    - qtpy
    - scikit-image
    - scipy
    - tifffile

test:
  imports:
    - napari_bud_cell_segmenter
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - pyqt
    - python {{ python_min }}

about:
  home: https://pypi.org/project/napari-bud-cell-segmenter
  summary: A plugin to segment embryonic mammary bud cells and detect 2 RNA probes
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/AurelienMaillot/napari-bud-cell-segmenter

extra:
  recipe-maintainers:
    - goanpeca
    - jaimergp
